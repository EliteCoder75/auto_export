backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "images"

locale: 'fr'

collections:

  # =============================
  # Catalogue Véhicules (unique)
  # =============================
  - name: "vehicules"
    label: "Catalogue Véhicules"
    label_singular: "Véhicule"
    folder: "_vehicules"
    create: true
    slug: "{{fields.categorie}}-{{fields.year}}-{{fields.brand}}-{{fields.model}}"
    summary: "{{fields.brand}} {{fields.model}} {{fields.year}} — {{fields.price}} €"
    view_filters:
      - label: "Neufs"
        field: categorie
        pattern: "neuf"
      - label: "Export — Moins de 3 ans"
        field: categorie
        pattern: "export"
      - label: "Occasion France"
        field: categorie
        pattern: "france"
      - label: "En stock"
        field: disponibilite
        pattern: "stock"
      - label: "Sur commande"
        field: disponibilite
        pattern: "commande"
      - label: "Vendu"
        field: disponibilite
        pattern: "vendu"
    view_groups:
      - label: "Par catégorie"
        field: categorie
      - label: "Par disponibilité"
        field: disponibilite
      - label: "Par marque"
        field: brand
    fields:
      - label: "Catégorie"
        name: "categorie"
        widget: "select"
        hint: "Détermine la page d'affichage du véhicule"
        options:
          - {label: "Véhicule Neuf — Export Maghreb", value: "neuf"}
          - {label: "Occasion — Moins de 3 ans (Export Maghreb)", value: "export"}
          - {label: "Occasion Classique — France", value: "france"}
      - {label: "ID", name: "id", widget: "string", hint: "Identifiant unique (ex: VN-001, VO-001)"}
      - {label: "Marque", name: "brand", widget: "string", hint: "Ex: Peugeot, Renault..."}
      - {label: "Modèle", name: "model", widget: "string", hint: "Ex: 208, Clio, Golf..."}
      - {label: "Finition", name: "finition", widget: "string", required: false, hint: "Ex: Allure, GT Line..."}
      - {label: "Année", name: "year", widget: "number", value_type: "int", min: 2010, max: 2028}
      - {label: "Kilométrage", name: "kilometrage", widget: "number", value_type: "int", required: false, hint: "En km — laisser vide si véhicule neuf"}
      - label: "Transmission"
        name: "transmission"
        widget: "select"
        options:
          - {label: "Manuelle", value: "Manuelle"}
          - {label: "Automatique", value: "Automatique"}
      - {label: "Moteur", name: "motor", widget: "string", required: false, hint: "Ex: 1.2 PureTech 130 CH"}
      - label: "Carburant"
        name: "fuel"
        widget: "select"
        options:
          - {label: "Essence", value: "Essence"}
          - {label: "Diesel", value: "Diesel"}
          - {label: "Électrique", value: "Électrique"}
          - {label: "Hybride", value: "Hybride"}
          - {label: "Hybride Rechargeable", value: "Hybride Rechargeable"}
      - {label: "Couleur extérieure", name: "exterior_color", widget: "string", required: false}
      - {label: "Couleur intérieure", name: "interior_color", widget: "string", required: false}
      - {label: "Prix (€)", name: "price", widget: "number", value_type: "int"}
      - label: "Disponibilité"
        name: "disponibilite"
        widget: "select"
        default: "stock"
        options:
          - {label: "En stock", value: "stock"}
          - {label: "Sur commande", value: "commande"}
          - {label: "Vendu", value: "vendu"}
      - {label: "Image principale", name: "image", widget: "image"}
      - label: "Galerie (max 20 photos)"
        name: "gallery"
        widget: "list"
        required: false
        max: 20
        field: {label: "Photo", name: "image", widget: "image"}
      - {label: "Description", name: "desc", widget: "text", required: false}

  # =============================
  # Paramètres du site
  # =============================
  - name: "settings"
    label: "Paramètres du site"
    files:
      - label: "Informations de contact"
        name: "contact"
        file: "_settings/contact.json"
        fields:
          - {label: "Téléphone mobile", name: "phone", widget: "string"}
          - {label: "Téléphone fixe", name: "phone_fixe", widget: "string", required: false}
          - {label: "WhatsApp", name: "whatsapp", widget: "string"}
          - {label: "Email", name: "email", widget: "string", required: false}
          - {label: "Adresse garage", name: "address", widget: "string"}
          - {label: "Horaires", name: "hours", widget: "string", default: "Lun–Sam : 9h00 – 19h00"}
