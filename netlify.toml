[build]
  publish = "."
  command = "npm install && npm run build"
  functions = "netlify/functions"

# Force HTTPS
[[redirects]]
  from = "http://autoexportithri.fr/*"
  to   = "https://autoexportithri.fr/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "http://www.autoexportithri.fr/*"
  to   = "https://autoexportithri.fr/:splat"
  status = 301
  force  = true

[build.environment]
  NODE_VERSION = "18"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
